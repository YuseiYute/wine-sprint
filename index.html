<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍷 ワインエキスパート 500問スプリント</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #1A0A14;
  --surface: #2D1225;
  --surface2: #3D1A35;
  --primary: #4A0E2B;
  --accent: #C8A55B;
  --accent-dim: #8A6F35;
  --text: #F5E6D0;
  --text-dim: #A0857A;
  --success: #4CAF50;
  --warning: #FF9800;
  --danger: #E53935;
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  padding: 0 0 60px;
}
h1, h2, h3 { font-family: 'Playfair Display', serif; }

/* ── HEADER ── */
header {
  background: linear-gradient(135deg, var(--primary) 0%, #2D0820 100%);
  border-bottom: 1px solid var(--accent-dim);
  padding: 20px 16px 16px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 12px;
}
.header-title {
  font-size: 1.3rem;
  color: var(--accent);
  letter-spacing: 0.04em;
}
.header-sub {
  font-size: 0.75rem;
  color: var(--text-dim);
  margin-top: 2px;
  font-family: 'Noto Sans JP', sans-serif;
}
.header-stats {
  text-align: right;
}
.day-badge {
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--accent);
  font-family: 'Playfair Display', serif;
}
.day-badge span { font-size: 0.85rem; color: var(--text-dim); }
.streak-badge {
  font-size: 0.72rem;
  color: var(--text-dim);
  margin-top: 2px;
}
.streak-badge strong { color: var(--warning); }
.progress-wrap { position: relative; }
.progress-bar {
  height: 6px;
  background: var(--surface2);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent-dim), var(--accent));
  border-radius: 3px;
  transition: width 0.8s ease;
}
.progress-labels {
  display: flex;
  justify-content: space-between;
  font-size: 0.68rem;
  color: var(--text-dim);
  margin-top: 4px;
}

/* ── MAIN ── */
main { max-width: 900px; margin: 0 auto; padding: 16px; }
section { margin-bottom: 24px; }
.section-title {
  font-size: 0.75rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent-dim);
  margin-bottom: 12px;
  padding-left: 8px;
  border-left: 3px solid var(--accent);
}

/* ── TODAY CARD ── */
.today-card {
  background: var(--surface);
  border: 1px solid var(--accent-dim);
  border-radius: var(--radius);
  padding: 20px;
}
.today-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.today-date { font-size: 0.8rem; color: var(--text-dim); }
.today-phase {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 0.72rem;
  font-weight: 700;
}
.today-theme {
  font-size: 1.1rem;
  color: var(--accent);
  margin-bottom: 4px;
}
.today-note { font-size: 0.78rem; color: var(--text-dim); }
.today-body {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 20px;
  align-items: center;
  margin-top: 16px;
}
.input-group { width: 100%; }
.input-label {
  font-size: 0.75rem;
  color: var(--text-dim);
  margin-bottom: 6px;
}
.slider-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
input[type="range"] {
  flex: 1;
  -webkit-appearance: none;
  height: 4px;
  background: var(--surface2);
  border-radius: 2px;
  outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  background: var(--accent);
  border-radius: 50%;
  cursor: pointer;
}
.count-input {
  width: 64px;
  background: var(--surface2);
  border: 1px solid var(--accent-dim);
  border-radius: 6px;
  color: var(--text);
  font-size: 1rem;
  font-weight: 700;
  text-align: center;
  padding: 4px;
}
.quick-btns {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.quick-btn {
  background: var(--surface2);
  border: 1px solid var(--surface2);
  color: var(--text-dim);
  border-radius: 6px;
  padding: 3px 8px;
  font-size: 0.7rem;
  cursor: pointer;
  transition: all 0.2s;
}
.quick-btn:hover { border-color: var(--accent); color: var(--accent); }
.memo-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--surface2);
  border-radius: 6px;
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.8rem;
  padding: 8px;
  resize: none;
  height: 52px;
  margin-bottom: 10px;
  transition: border-color 0.2s;
}
.memo-input:focus { outline: none; border-color: var(--accent-dim); }
.checkin-btn {
  width: 100%;
  background: linear-gradient(135deg, var(--accent-dim), var(--accent));
  border: none;
  border-radius: 8px;
  color: #1A0A14;
  font-weight: 700;
  font-size: 0.9rem;
  padding: 10px;
  cursor: pointer;
  transition: opacity 0.2s;
}
.checkin-btn:hover { opacity: 0.9; }
.checkin-btn:disabled { opacity: 0.4; cursor: default; }

/* Ring chart */
.ring-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 100px;
}
.ring-svg { transform: rotate(-90deg); }
.ring-track { fill: none; stroke: var(--surface2); }
.ring-fill { fill: none; stroke-linecap: round; transition: stroke-dasharray 0.5s ease; }
.ring-label {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--accent);
  font-family: 'Playfair Display', serif;
}
.ring-sub { font-size: 0.65rem; color: var(--text-dim); margin-top: 2px; text-align: center; }
.saved-badge {
  font-size: 0.7rem;
  color: var(--success);
  text-align: center;
  margin-top: 6px;
  height: 16px;
}

/* ── CALENDAR ── */
.cal-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 12px;
}
.leg-item {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 0.65rem;
  color: var(--text-dim);
}
.leg-dot {
  width: 10px;
  height: 10px;
  border-radius: 2px;
  flex-shrink: 0;
}
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}
.cal-weekday {
  text-align: center;
  font-size: 0.62rem;
  color: var(--text-dim);
  padding: 4px 0;
  font-weight: 700;
  letter-spacing: 0.06em;
}
.cal-cell {
  aspect-ratio: 1;
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 0.68rem;
  position: relative;
  cursor: default;
  transition: transform 0.15s;
}
.cal-cell.sprint-day { cursor: pointer; }
.cal-cell.sprint-day:hover { transform: scale(1.05); }
.cal-cell.empty { background: transparent; }
.cal-cell.outside-sprint { background: var(--surface); opacity: 0.2; }
.cal-cell.future { opacity: 0.45; }
.cal-cell.today {
  outline: 2px solid var(--accent);
  outline-offset: 1px;
  box-shadow: 0 0 10px rgba(200,165,91,0.3);
}
.cal-cell .cell-day { font-weight: 700; font-size: 0.7rem; line-height: 1; }
.cal-cell .cell-count { font-size: 0.6rem; opacity: 0.85; }
.cal-cell .cell-status { font-size: 0.75rem; line-height: 1; }

/* ── KPI ── */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 12px;
}
.kpi-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 14px 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  border: 1px solid var(--surface2);
  transition: border-color 0.2s;
}
.kpi-card:hover { border-color: var(--accent-dim); }
.kpi-name { font-size: 0.8rem; font-weight: 700; text-align: center; }
.kpi-ring-wrap { position: relative; display: flex; justify-content: center; align-items: center; }
.kpi-ring-text {
  position: absolute;
  text-align: center;
  font-family: 'Playfair Display', serif;
}
.kpi-ring-pct { font-size: 1rem; font-weight: 700; display: block; }
.kpi-ring-goal { font-size: 0.58rem; color: var(--text-dim); }
.kpi-input-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
  width: 100%;
}
.kpi-input-wrap label { font-size: 0.65rem; color: var(--text-dim); white-space: nowrap; }
.kpi-score-input {
  width: 52px;
  background: var(--surface2);
  border: 1px solid var(--surface2);
  border-radius: 6px;
  color: var(--text);
  font-size: 0.85rem;
  font-weight: 700;
  text-align: center;
  padding: 3px;
  transition: border-color 0.2s;
}
.kpi-score-input:focus { outline: none; border-color: var(--accent-dim); }
.kpi-tag {
  font-size: 0.6rem;
  padding: 1px 6px;
  border-radius: 10px;
  font-weight: 700;
}
.tag-ok { background: rgba(76,175,80,0.2); color: var(--success); }
.tag-ng { background: rgba(229,57,53,0.2); color: var(--danger); }
.tag-na { background: rgba(160,133,122,0.15); color: var(--text-dim); }

/* ── DATA PANEL ── */
.data-panel {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 16px;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
}
.data-btn {
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 0.78rem;
  font-weight: 700;
  cursor: pointer;
  border: 1px solid;
  transition: all 0.2s;
}
.btn-export { background: transparent; border-color: var(--accent-dim); color: var(--accent); }
.btn-export:hover { background: rgba(200,165,91,0.1); }
.btn-import { background: transparent; border-color: var(--text-dim); color: var(--text-dim); }
.btn-import:hover { border-color: var(--text); color: var(--text); }
.btn-reset { background: transparent; border-color: var(--danger); color: var(--danger); }
.btn-reset:hover { background: rgba(229,57,53,0.1); }
#importFile { display: none; }
.data-info { font-size: 0.7rem; color: var(--text-dim); margin-left: auto; }

/* ── RESPONSIVE ── */
@media (max-width: 480px) {
  .today-body { grid-template-columns: 1fr; }
  .ring-wrap { flex-direction: row; gap: 12px; align-items: center; }
  .ring-sub { text-align: left; }
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .header-title { font-size: 1.1rem; }
}
@media (max-width: 360px) {
  .cal-cell { font-size: 0.6rem; border-radius: 5px; }
}
</style>
</head>
<body>

<!-- ① HEADER -->
<header>
  <div class="header-top">
    <div>
      <h1 class="header-title">🍷 500問スプリント</h1>
      <div class="header-sub">ワインエキスパート試験対策 Apr 29 – Jun 6</div>
    </div>
    <div class="header-stats">
      <div class="day-badge" id="dayBadge">— <span>/ 39日</span></div>
      <div class="streak-badge" id="streakBadge">🔥 連続 <strong>0</strong> 日</div>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-labels">
      <span id="totalCount">累計 0問</span>
      <span>目標 19,500問</span>
    </div>
  </div>
</header>

<main>

<!-- ② TODAY'S CARD -->
<section>
  <div class="section-title">Today's Card</div>
  <div class="today-card">
    <div class="today-header">
      <div>
        <div class="today-date" id="todayDate">—</div>
        <div class="today-theme" id="todayTheme">—</div>
        <div class="today-note" id="todayNote"></div>
      </div>
      <div class="today-phase" id="todayPhaseBadge">—</div>
    </div>
    <div class="today-body">
      <div class="input-group">
        <div class="input-label">今日の問題数</div>
        <div class="slider-wrap">
          <input type="range" id="countSlider" min="0" max="500" step="50" value="0">
          <input type="number" id="countInput" class="count-input" min="0" max="500" value="0">
        </div>
        <div class="quick-btns">
          <button class="quick-btn" onclick="setCount(100)">100</button>
          <button class="quick-btn" onclick="setCount(200)">200</button>
          <button class="quick-btn" onclick="setCount(300)">300</button>
          <button class="quick-btn" onclick="setCount(400)">400</button>
          <button class="quick-btn" onclick="setCount(500)">500 ✓</button>
        </div>
        <div class="input-label">メモ（任意）</div>
        <textarea id="memoInput" class="memo-input" placeholder="今日の気づき、弱点など…"></textarea>
        <button id="checkinBtn" class="checkin-btn" onclick="saveCheckin()">チェックイン</button>
        <div id="savedBadge" class="saved-badge"></div>
      </div>
      <div class="ring-wrap">
        <svg class="ring-svg" width="100" height="100" viewBox="0 0 100 100">
          <circle class="ring-track" cx="50" cy="50" r="40" stroke-width="8"/>
          <circle class="ring-fill" id="ringFill" cx="50" cy="50" r="40" stroke-width="8"
            stroke="var(--accent)" stroke-dasharray="0 251.2"/>
        </svg>
        <div>
          <div class="ring-label" id="ringPct">0%</div>
          <div class="ring-sub">今日の<br>達成率</div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- ③ 39日カレンダー -->
<section id="calSection">
  <div class="section-title">39日カレンダー</div>
  <div class="cal-legend" id="calLegend"></div>
  <div class="cal-grid" id="calGrid">
    <div class="cal-weekday">月</div>
    <div class="cal-weekday">火</div>
    <div class="cal-weekday">水</div>
    <div class="cal-weekday">木</div>
    <div class="cal-weekday">金</div>
    <div class="cal-weekday">土</div>
    <div class="cal-weekday">日</div>
  </div>
</section>

<!-- ④ KPI ダッシュボード -->
<section>
  <div class="section-title">KPI ダッシュボード — 正答率80%を目指す</div>
  <div class="kpi-grid" id="kpiGrid"></div>
</section>

<!-- ⑤ データ管理 -->
<section>
  <div class="section-title">データ管理</div>
  <div class="data-panel">
    <button class="data-btn btn-export" onclick="exportData()">📥 エクスポート</button>
    <button class="data-btn btn-import" onclick="document.getElementById('importFile').click()">📤 インポート</button>
    <input type="file" id="importFile" accept=".json" onchange="importData(event)">
    <button class="data-btn btn-reset" onclick="resetData()">🗑 リセット</button>
    <div class="data-info" id="dataInfo">—</div>
  </div>
</section>

</main>

<script>
// ── CONSTANTS ──
const SPRINT_START = new Date('2026-04-29T00:00:00');
const SPRINT_END   = new Date('2026-06-06T00:00:00');
const TOTAL_DAYS   = 39;
const GOAL_TOTAL   = 19500;
const CIRCUMFERENCE = 2 * Math.PI * 40; // 251.2

const PHASES = [
  { phase: 1, start: '2026-04-29', end: '2026-05-02', label: 'イタリア完結',        color: '#7B3F6E', short: '伊①' },
  { phase: 2, start: '2026-05-03', end: '2026-05-06', label: 'イタリア復習+概論',   color: '#9B4F9B', short: '伊②+概' },
  { phase: 3, start: '2026-05-07', end: '2026-05-09', label: '酒類飲料概論',        color: '#4A7FAA', short: '酒類' },
  { phase: 4, start: '2026-05-10', end: '2026-05-14', label: 'アメリカ',            color: '#3A8B5E', short: '米' },
  { phase: 5, start: '2026-05-15', end: '2026-05-18', label: '日本',                color: '#C0503A', short: '日' },
  { phase: 6, start: '2026-05-19', end: '2026-05-22', label: 'オーストラリア',      color: '#7A6F2A', short: '豪' },
  { phase: 7, start: '2026-05-23', end: '2026-05-26', label: 'スペイン',            color: '#B03A3A', short: '西' },
  { phase: 8, start: '2026-05-27', end: '2026-05-29', label: 'ドイツ',              color: '#3A5E9B', short: '独' },
  { phase: 9, start: '2026-05-30', end: '2026-05-31', label: 'ニュージーランド',    color: '#2A8B8B', short: 'NZ' },
  { phase:10, start: '2026-06-01', end: '2026-06-02', label: 'ポルトガル',          color: '#7A5030', short: '葡' },
  { phase:11, start: '2026-06-03', end: '2026-06-06', label: 'フランス復習+模試',  color: '#4A2060', short: '仏+模' },
];

const KPI_SUBJECTS = [
  'フランス', 'イタリア', 'ワイン概論', '酒類飲料概論',
  'アメリカ', '日本', 'オーストラリア', 'スペイン',
  'ドイツ', 'ニュージーランド', 'ポルトガル'
];

// ── STORAGE ──
const KEY_DAILY = 'wine-sprint-daily';
const KEY_KPI   = 'wine-sprint-kpi';

function loadDaily() {
  try { return JSON.parse(localStorage.getItem(KEY_DAILY)) || {}; } catch(e) { return {}; }
}
function loadKPI() {
  try { return JSON.parse(localStorage.getItem(KEY_KPI)) || {}; } catch(e) { return {}; }
}
function saveDaily(data) { localStorage.setItem(KEY_DAILY, JSON.stringify(data)); }
function saveKPI(data)   { localStorage.setItem(KEY_KPI, JSON.stringify(data)); }

// ── DATE HELPERS ──
function dateKey(d) {
  return d.toISOString().slice(0, 10);
}
function today() {
  const d = new Date();
  d.setHours(0,0,0,0);
  return d;
}
function dayNum(d) {
  const diff = d - SPRINT_START;
  return Math.floor(diff / 86400000) + 1;
}
function getPhase(d) {
  const key = dateKey(d);
  return PHASES.find(p => p.start <= key && key <= p.end) || null;
}

// ── RING CHART ──
function updateRing(pct) {
  const fill = document.getElementById('ringFill');
  const pctClamped = Math.min(100, Math.max(0, pct));
  const dash = (CIRCUMFERENCE * pctClamped / 100).toFixed(1);
  fill.setAttribute('stroke-dasharray', `${dash} ${CIRCUMFERENCE}`);
  fill.setAttribute('stroke',
    pct >= 100 ? 'var(--success)' : pct >= 60 ? 'var(--accent)' : 'var(--warning)');
  document.getElementById('ringPct').textContent = pctClamped.toFixed(0) + '%';
}

// ── COUNT SYNC ──
function setCount(v) {
  v = Math.min(500, Math.max(0, parseInt(v) || 0));
  document.getElementById('countSlider').value = v;
  document.getElementById('countInput').value  = v;
  updateRing(v / 5);
}

document.getElementById('countSlider').addEventListener('input', function() {
  setCount(this.value);
});
document.getElementById('countInput').addEventListener('input', function() {
  setCount(this.value);
});

// ── CHECKIN ──
function saveCheckin() {
  const key = dateKey(today());
  const count = parseInt(document.getElementById('countInput').value) || 0;
  const memo  = document.getElementById('memoInput').value.trim();
  const daily = loadDaily();
  daily[key] = { count, memo, ts: Date.now() };
  saveDaily(daily);
  document.getElementById('savedBadge').textContent = '✅ 保存しました';
  setTimeout(() => document.getElementById('savedBadge').textContent = '', 2500);
  renderHeader();
  renderCalendar();
}

// ── HEADER ──
function renderHeader() {
  const t = today();
  const day = dayNum(t);
  const daily = loadDaily();

  // day badge
  const dayEl = document.getElementById('dayBadge');
  if (day < 1 || day > TOTAL_DAYS) {
    dayEl.innerHTML = `— <span>/ ${TOTAL_DAYS}日</span>`;
  } else {
    dayEl.innerHTML = `Day ${day} <span>/ ${TOTAL_DAYS}日</span>`;
  }

  // progress
  const total = Object.values(daily).reduce((s, v) => s + (v.count || 0), 0);
  document.getElementById('totalCount').textContent = `累計 ${total.toLocaleString()}問`;
  const pct = Math.min(100, total / GOAL_TOTAL * 100);
  document.getElementById('progressFill').style.width = pct + '%';

  // streak
  let streak = 0, maxStreak = 0, cur = 0;
  for (let i = 0; i < TOTAL_DAYS; i++) {
    const d = new Date(SPRINT_START);
    d.setDate(d.getDate() + i);
    if (d > t) break;
    const k = dateKey(d);
    if (daily[k] && daily[k].count > 0) {
      cur++;
      if (i === dayNum(t) - 2 || dateKey(d) === dateKey(new Date(t - 86400000))) streak = cur;
      if (cur > maxStreak) maxStreak = cur;
    } else { cur = 0; }
  }
  // check today
  const todayKey = dateKey(t);
  if (daily[todayKey] && daily[todayKey].count > 0) streak = cur;
  document.getElementById('streakBadge').innerHTML =
    `🔥 連続 <strong>${streak}</strong> 日 （最長 ${maxStreak} 日）`;

  // data info
  const keys = Object.keys(daily).length;
  document.getElementById('dataInfo').textContent = `記録 ${keys}日分 / 累計 ${total.toLocaleString()}問`;
}

// ── TODAY CARD ──
function renderToday() {
  const t = today();
  const key = dateKey(t);
  const phase = getPhase(t);
  const daily = loadDaily();

  // date display
  const fmt = new Intl.DateTimeFormat('ja-JP', { month: 'long', day: 'numeric', weekday: 'short' });
  document.getElementById('todayDate').textContent = fmt.format(t);

  if (phase) {
    document.getElementById('todayTheme').textContent = phase.label;
    document.getElementById('todayPhaseBadge').textContent = `Phase ${phase.phase}`;
    document.getElementById('todayPhaseBadge').style.background = phase.color + '44';
    document.getElementById('todayPhaseBadge').style.color = phase.color;
    document.getElementById('todayPhaseBadge').style.border = `1px solid ${phase.color}`;
  } else if (dayNum(t) < 1) {
    document.getElementById('todayTheme').textContent = 'スプリント開始前';
  } else {
    document.getElementById('todayTheme').textContent = 'スプリント終了';
  }

  // load existing data
  if (daily[key]) {
    setCount(daily[key].count);
    document.getElementById('memoInput').value = daily[key].memo || '';
    document.getElementById('savedBadge').textContent = '✅ 本日チェックイン済み';
  } else {
    setCount(0);
  }
}

// ── CALENDAR ──
function renderCalendar() {
  const daily = loadDaily();
  const t = today();
  const todayStr = dateKey(t);

  // build legend
  const legEl = document.getElementById('calLegend');
  legEl.innerHTML = PHASES.map(p =>
    `<div class="leg-item"><div class="leg-dot" style="background:${p.color}"></div>${p.label}</div>`
  ).join('');

  // calendar cells: start from Monday of the week containing SPRINT_START
  // SPRINT_START is 2026-04-29 (Wednesday = day 3, Mon=1)
  const startDow = SPRINT_START.getDay(); // 0=Sun,1=Mon...
  // Monday offset: if Wednesday(3) -> go back 2 days to Monday
  const mondayOffset = startDow === 0 ? 6 : startDow - 1;
  const calStart = new Date(SPRINT_START);
  calStart.setDate(calStart.getDate() - mondayOffset);

  const grid = document.getElementById('calGrid');
  // remove old cells but keep weekday headers (first 7 children)
  while (grid.children.length > 7) grid.removeChild(grid.lastChild);

  // 6 weeks = 42 cells
  for (let i = 0; i < 42; i++) {
    const d = new Date(calStart);
    d.setDate(calStart.getDate() + i);
    const dKey = dateKey(d);
    const inSprint = dKey >= dateKey(SPRINT_START) && dKey <= dateKey(SPRINT_END);
    const isPast   = d < t;
    const isToday  = dKey === todayStr;
    const isFuture = d > t;

    const cell = document.createElement('div');
    cell.className = 'cal-cell';

    if (!inSprint) {
      cell.classList.add('outside-sprint');
      cell.innerHTML = `<span class="cell-day" style="opacity:0.3">${d.getDate()}</span>`;
    } else {
      cell.classList.add('sprint-day');
      if (isToday) cell.classList.add('today');
      else if (isFuture) cell.classList.add('future');

      const phase = getPhase(d);
      if (phase) cell.style.background = phase.color + (isFuture ? '30' : '55');

      const rec = daily[dKey];
      let statusHTML = '';
      if (rec && rec.count > 0) {
        statusHTML = `<span class="cell-status">✅</span><span class="cell-count">${rec.count}</span>`;
      } else if (isPast && !isToday) {
        statusHTML = `<span class="cell-status">⚠️</span>`;
      }
      cell.innerHTML = `<span class="cell-day">${d.getDate()}</span>${statusHTML}`;

      if (isToday) {
        cell.setAttribute('id', 'calToday');
        cell.title = '今日';
      }
    }
    grid.appendChild(cell);
  }

  // scroll to today
  const todayCell = document.getElementById('calToday');
  if (todayCell) setTimeout(() => todayCell.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 300);
}

// ── KPI ──
function renderKPI() {
  const kpi = loadKPI();
  const grid = document.getElementById('kpiGrid');
  grid.innerHTML = '';

  KPI_SUBJECTS.forEach(subj => {
    const score = kpi[subj];
    const hasScore = score !== undefined && score !== null && score !== '';
    const pct = hasScore ? Math.min(100, Math.max(0, parseInt(score))) : null;
    const circ = 2 * Math.PI * 32; // r=32
    const dash = pct !== null ? (circ * pct / 100).toFixed(1) : 0;
    const strokeColor = pct === null ? '#555' : pct >= 80 ? 'var(--success)' : pct >= 60 ? 'var(--warning)' : 'var(--danger)';
    const tag = pct === null ? `<span class="kpi-tag tag-na">未入力</span>` :
                pct >= 80   ? `<span class="kpi-tag tag-ok">✓ 達成</span>` :
                              `<span class="kpi-tag tag-ng">${80-pct}% 不足</span>`;

    const card = document.createElement('div');
    card.className = 'kpi-card';
    card.innerHTML = `
      <div class="kpi-name">${subj}</div>
      <div class="kpi-ring-wrap">
        <svg width="80" height="80" viewBox="0 0 80 80" style="transform:rotate(-90deg)">
          <circle fill="none" stroke="var(--surface2)" cx="40" cy="40" r="32" stroke-width="7"/>
          <circle fill="none" cx="40" cy="40" r="32" stroke-width="7" stroke-linecap="round"
            stroke="${strokeColor}"
            stroke-dasharray="${dash} ${circ.toFixed(1)}"/>
          ${pct !== null ? `<circle fill="none" stroke="rgba(255,255,255,0.15)" cx="40" cy="40" r="32"
            stroke-width="1" stroke-dasharray="${(circ*80/100).toFixed(1)} ${circ.toFixed(1)}"/>` : ''}
        </svg>
        <div class="kpi-ring-text">
          <span class="kpi-ring-pct" style="color:${strokeColor}">${pct !== null ? pct+'%' : '—'}</span>
          <span class="kpi-ring-goal">80%</span>
        </div>
      </div>
      ${tag}
      <div class="kpi-input-wrap">
        <label>正答率</label>
        <input type="number" class="kpi-score-input" min="0" max="100"
          value="${hasScore ? pct : ''}" placeholder="0-100"
          data-subject="${subj}" onchange="updateKPI(this)">
        <span style="font-size:0.65rem;color:var(--text-dim)">%</span>
      </div>`;
    grid.appendChild(card);
  });
}

function updateKPI(input) {
  const subj = input.dataset.subject;
  const val  = input.value === '' ? null : Math.min(100, Math.max(0, parseInt(input.value) || 0));
  const kpi = loadKPI();
  if (val === null) delete kpi[subj]; else kpi[subj] = val;
  saveKPI(kpi);
  renderKPI();
}

// ── DATA MANAGEMENT ──
function exportData() {
  const data = { daily: loadDaily(), kpi: loadKPI(), exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `wine-sprint-${dateKey(new Date())}.json`;
  a.click();
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (data.daily) saveDaily(data.daily);
      if (data.kpi)   saveKPI(data.kpi);
      alert('インポート完了しました。');
      init();
    } catch(err) { alert('ファイルの形式が正しくありません。'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function resetData() {
  if (!confirm('すべての進捗データを削除します。\n本当によろしいですか？')) return;
  localStorage.removeItem(KEY_DAILY);
  localStorage.removeItem(KEY_KPI);
  alert('データをリセットしました。');
  init();
}

// ── INIT ──
function init() {
  renderHeader();
  renderToday();
  renderCalendar();
  renderKPI();
}

init();
</script>
